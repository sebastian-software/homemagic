name: Matter ConnectedHomeIP candidate

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - config/matter-controller-candidates.json
      - scripts/run-connectedhomeip-candidate.sh
      - .github/workflows/matter-connectedhomeip-candidate.yml

permissions:
  contents: read

jobs:
  build:
    name: ConnectedHomeIP (${{ matrix.label }})
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            architecture: x86_64
            label: Linux x86_64
          - runner: macos-14
            architecture: arm64
            label: macOS ARM64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out HomeMagic
        uses: actions/checkout@v6

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: >-
          sudo apt-get update && sudo apt-get install --yes
          gcc g++ python3 pkg-config libssl-dev libdbus-1-dev libglib2.0-dev
          ninja-build python3-venv python3-dev unzip

      - name: Verify runner architecture
        run: test "$(uname -m)" = "${{ matrix.architecture }}"

      - name: Build pinned official controller
        run: ./scripts/run-connectedhomeip-candidate.sh report.json "${{ matrix.architecture }}"

      - name: Upload build report
        uses: actions/upload-artifact@v6
        with:
          name: connectedhomeip-${{ matrix.architecture }}
          path: report.json
          if-no-files-found: error
