name: Matter controller candidate

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - config/matter-controller-candidates.json
      - scripts/run-matter-controller-candidate.sh
      - .github/workflows/matter-controller-candidate.yml

permissions:
  contents: read

jobs:
  native-candidate:
    name: ${{ matrix.candidate }} (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - candidate: rust-matc
            runner: ubuntu-latest
            architecture: x86_64
            label: Linux x86_64
          - candidate: rust-matc
            runner: macos-14
            architecture: arm64
            label: macOS ARM64
          - candidate: rs-matter
            runner: ubuntu-latest
            architecture: x86_64
            label: Linux x86_64
          - candidate: rs-matter
            runner: macos-14
            architecture: arm64
            label: macOS ARM64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out HomeMagic
        uses: actions/checkout@v6

      - name: Install Rust 1.93
        uses: dtolnay/rust-toolchain@1.93.0
        with:
          components: rustfmt

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes libdbus-1-dev pkg-config

      - name: Verify runner architecture
        run: test "$(uname -m)" = "${{ matrix.architecture }}"

      - name: Run pinned candidate audit
        run: ./scripts/run-matter-controller-candidate.sh "${{ matrix.candidate }}" report.json "${{ matrix.architecture }}"

      - name: Upload candidate report
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.candidate }}-${{ matrix.architecture }}
          path: report.json
          if-no-files-found: error
