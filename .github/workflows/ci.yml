name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  rust:
    name: Rust quality (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Linux native dependencies
        run: sudo apt-get update && sudo apt-get install --yes libdbus-1-dev pkg-config

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Run tests
        run: cargo test --workspace --all-features --locked

      - name: Verify historical migrations
        run: cargo test -p homemagic-storage --test migration_fixtures --locked

      - name: Scan fixtures and evidence for plaintext secrets
        run: ./scripts/scan-secrets.sh
